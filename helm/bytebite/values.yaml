# Namespace to deploy into. Created automatically by Helm (--create-namespace).
namespace: team-bytebite

client:
  image:
    repository: ghcr.io/aet-devops26/team-bytebite/client
    tag: latest
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 80
    targetPort: 80
  replicaCount: 1

apiGateway:
  image:
    repository: ghcr.io/aet-devops26/team-bytebite/api-gateway
    tag: latest
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 8080
    targetPort: 8080
  replicaCount: 1

userService:
  image:
    repository: ghcr.io/aet-devops26/team-bytebite/user-service
    tag: latest
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 8080
    targetPort: 8080
  replicaCount: 1

groceryService:
  image:
    repository: ghcr.io/aet-devops26/team-bytebite/grocery-service
    tag: latest
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 8080
    targetPort: 8080
  replicaCount: 1

genai:
  image:
    repository: ghcr.io/aet-devops26/team-bytebite/gen-ai
    tag: latest
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 8000
    targetPort: 8000
  replicaCount: 1
  logosKey: ""
  openaiApiKey: ""

ingress:
  enabled: true
  className: "nginx"
  host: "team-bytebite.stud.k8s.aet.cit.tum.de"
  tls: true
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
