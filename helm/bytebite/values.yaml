# Namespace to deploy into. Created automatically by Helm (--create-namespace).
namespace: team-bytebite

client:
  image:
    repository: ghcr.io/aet-devops26/team-bytebite/client
    tag: latest
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 80
    targetPort: 80
  replicaCount: 1

apiGateway:
  image:
    repository: ghcr.io/aet-devops26/team-bytebite/api-gateway
    tag: latest
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 8080
    targetPort: 8080
  replicaCount: 1

userService:
  image:
    repository: ghcr.io/aet-devops26/team-bytebite/user-service
    tag: latest
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 8080
    targetPort: 8080
  replicaCount: 1

groceryService:
  image:
    repository: ghcr.io/aet-devops26/team-bytebite/grocery-service
    tag: latest
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 8080
    targetPort: 8080
  replicaCount: 1

genai:
  image:
    repository: ghcr.io/aet-devops26/team-bytebite/gen-ai
    tag: latest
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 8000
    targetPort: 8000
  replicaCount: 1
  logosKey: ""
  openaiApiKey: ""

userDb:
  image:
    repository: ghcr.io/aet-devops26/team-bytebite/user-db
    tag: latest
    pullPolicy: Always
  name: bytebite_user
  user: bytebite_user
  # Empty falls back to the development password in secret.yaml. Override for real deploys.
  password: ""

groceryDb:
  image:
    repository: ghcr.io/aet-devops26/team-bytebite/grocery-db
    tag: latest
    pullPolicy: Always
  name: bytebite_grocery
  user: bytebite_grocery
  # Empty falls back to the development password in secret.yaml. Override for real deploys.
  password: ""

# Shared JWT signing/verification secret for user-service (signs) and
# api-gateway (verifies). Must be >=32 chars. Leave empty to fall back to the
# apps' built-in dev default; set via --set jwt.secret / a GitHub secret for real deploys.
jwt:
  secret: ""

ingress:
  enabled: true
  className: "nginx"
  host: "team-bytebite.stud.k8s.aet.cit.tum.de"
  tls: true
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"

monitoring:
  enabled: true

  prometheus:
    image:
      repository: prom/prometheus
      tag: v2.54.1
      pullPolicy: IfNotPresent
    resources:
      limits:
        cpu: "200m"
        memory: "512Mi"
      requests:
        cpu: "100m"
        memory: "256Mi"
    service:
      type: ClusterIP
      port: 9090
      targetPort: 9090
    replicaCount: 1
    scrapeInterval: 15s

  grafana:
    image:
      repository: grafana/grafana
      tag: 11.2.2
      pullPolicy: IfNotPresent
    resources:
      limits:
        cpu: "150m"
        memory: "256Mi"
      requests:
        cpu: "100m"
        memory: "128Mi"
    service:
      type: ClusterIP
      port: 3000
      targetPort: 3000
    replicaCount: 1
    adminUser: admin
    # Development fallback, matching compose.yaml so every local environment uses the
    # same login. Real deploys override this via the GRAFANA_ADMIN_PASSWORD secret.
    adminPassword: bytebite
    ingress:
      enabled: true
      path: /grafana
