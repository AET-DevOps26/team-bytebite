apiVersion: v1
kind: Secret
metadata:
  name: genai-secret
  namespace: {{ .Values.namespace }}
type: Opaque
data:
  logos-key: {{ .Values.genai.logosKey | b64enc | quote }}
  openai-api-key: {{ .Values.genai.openaiApiKey | b64enc | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: db-secret
  namespace: {{ .Values.namespace }}
type: Opaque
data:
  user-db-password: {{ .Values.userDb.password | b64enc | quote }}
  grocery-db-password: {{ .Values.groceryDb.password | b64enc | quote }}
{{- if .Values.jwt.secret }}
---
apiVersion: v1
kind: Secret
metadata:
  name: jwt-secret
  namespace: {{ .Values.namespace }}
type: Opaque
data:
  jwt-secret: {{ .Values.jwt.secret | b64enc | quote }}
{{- end }}