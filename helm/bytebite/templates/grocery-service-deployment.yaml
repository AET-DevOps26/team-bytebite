apiVersion: apps/v1
kind: Deployment
metadata:
  name: bytebite-grocery-service
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.groceryService.replicaCount }}
  selector:
    matchLabels:
      app: bytebite-grocery-service-selector
  template:
    metadata:
      labels:
        app: bytebite-grocery-service-selector
    spec:
      containers:
        - name: grocery-service
          image: "{{ .Values.groceryService.image.repository }}:{{ .Values.groceryService.image.tag }}"
          imagePullPolicy: {{ .Values.groceryService.image.pullPolicy }}
          resources:
            limits:
              cpu: "300m"
              memory: "512Mi"
            requests:
              cpu: "200m"
              memory: "256Mi"
          ports:
            - containerPort: {{ .Values.groceryService.service.targetPort }}
          env:
            # The app's dev default port is 8082; override it so it listens on
            # the container/Service port (8080), matching the api-gateway route.
            - name: SERVER_PORT
              value: "{{ .Values.groceryService.service.targetPort }}"
            - name: GENAI_BASE_URL
              value: "http://genai-service:{{ .Values.genai.service.port }}"
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://grocery-db:5432/{{ .Values.groceryDb.name }}"
            - name: SPRING_DATASOURCE_USERNAME
              value: {{ .Values.groceryDb.user }}
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: grocery-db-password
