{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bytebite-ingress
  namespace: {{ .Values.namespace }}
  {{- $annotations := .Values.ingress.annotations | default dict }}
  {{- if $annotations }}
  annotations:
    {{- toYaml $annotations | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.tls }}
  tls:
    - hosts:
        - {{ .Values.ingress.host | quote }}
      secretName: "bytebite-devops26-tls"
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: client-service
                port:
                  number: {{ .Values.client.service.port }}
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-gateway-service
                port:
                  number: {{ .Values.apiGateway.service.port }}
          {{- if and .Values.monitoring.enabled .Values.monitoring.grafana.ingress.enabled }}
          - path: {{ .Values.monitoring.grafana.ingress.path }}
            pathType: Prefix
            backend:
              service:
                name: grafana-service
                port:
                  number: {{ .Values.monitoring.grafana.service.port }}
          {{- end }}
{{- end }}
