{{- if .Values.monitoring.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: bytebite-monitoring-secret
  namespace: {{ .Values.namespace }}
type: Opaque
stringData:
  grafana-admin-user: {{ .Values.monitoring.grafana.adminUser | quote }}
  grafana-admin-password: {{ .Values.monitoring.grafana.adminPassword | quote }}
{{- end }}
