{{- if .Values.monitoring.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bytebite-grafana
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.monitoring.grafana.replicaCount }}
  selector:
    matchLabels:
      app: bytebite-grafana-selector
  template:
    metadata:
      labels:
        app: bytebite-grafana-selector
    spec:
      containers:
        - name: grafana
          image: "{{ .Values.monitoring.grafana.image.repository }}:{{ .Values.monitoring.grafana.image.tag }}"
          imagePullPolicy: {{ .Values.monitoring.grafana.image.pullPolicy }}
          resources:
            {{- toYaml .Values.monitoring.grafana.resources | nindent 12 }}
          ports:
            - containerPort: {{ .Values.monitoring.grafana.service.targetPort }}
          env:
            - name: GF_SECURITY_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: bytebite-monitoring-secret
                  key: grafana-admin-user
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bytebite-monitoring-secret
                  key: grafana-admin-password
            - name: GF_USERS_DEFAULT_THEME
              value: light
            - name: GF_METRICS_ENABLED
              value: "true"
            {{- if and .Values.ingress.enabled .Values.monitoring.grafana.ingress.enabled }}
            - name: GF_SERVER_ROOT_URL
              value: "{{ ternary "https" "http" .Values.ingress.tls }}://{{ .Values.ingress.host }}{{ .Values.monitoring.grafana.ingress.path }}"
            - name: GF_SERVER_SERVE_FROM_SUB_PATH
              value: "true"
            {{- end }}
          volumeMounts:
            - name: grafana-datasources
              mountPath: /etc/grafana/provisioning/datasources/datasource.yml
              subPath: datasource.yml
              readOnly: true
            - name: grafana-dashboard-providers
              mountPath: /etc/grafana/provisioning/dashboards/dashboards.yml
              subPath: dashboards.yml
              readOnly: true
            - name: grafana-alerting
              mountPath: /etc/grafana/provisioning/alerting/alerting.yml
              subPath: alerting.yml
              readOnly: true
            - name: grafana-dashboards
              mountPath: /etc/grafana/dashboards
              readOnly: true
            - name: grafana-data
              mountPath: /var/lib/grafana
      volumes:
        - name: grafana-datasources
          configMap:
            name: bytebite-grafana-provisioning
            items:
              - key: datasource.yml
                path: datasource.yml
        - name: grafana-dashboard-providers
          configMap:
            name: bytebite-grafana-provisioning
            items:
              - key: dashboards.yml
                path: dashboards.yml
        - name: grafana-alerting
          configMap:
            name: bytebite-grafana-provisioning
            items:
              - key: alerting.yml
                path: alerting.yml
        - name: grafana-dashboards
          configMap:
            name: bytebite-grafana-dashboard
        - name: grafana-data
          emptyDir: {}
{{- end }}
