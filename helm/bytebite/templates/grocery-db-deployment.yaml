apiVersion: apps/v1
kind: Deployment
metadata:
  name: bytebite-grocery-db
  namespace: {{ .Values.namespace }}
spec:
  replicas: 1
  # Ephemeral DB (emptyDir): recreate the pod rather than rolling, so two
  # instances never run at once and each start gets a clean database.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: bytebite-grocery-db
  template:
    metadata:
      labels:
        app: bytebite-grocery-db
    spec:
      containers:
        - name: grocery-db
          image: "{{ .Values.groceryDb.image.repository }}:{{ .Values.groceryDb.image.tag }}"
          imagePullPolicy: {{ .Values.groceryDb.image.pullPolicy }}
          resources:
            limits:
              cpu: "250m"
              memory: "256Mi"
            requests:
              cpu: "100m"
              memory: "128Mi"
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: {{ .Values.groceryDb.name }}
            - name: POSTGRES_USER
              value: {{ .Values.groceryDb.user }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: grocery-db-password
          volumeMounts:
            - name: grocery-db-data
              mountPath: /var/lib/postgresql/data
      volumes:
        # Ephemeral storage: the database is recreated on every pod start.
        - name: grocery-db-data
          emptyDir: {}