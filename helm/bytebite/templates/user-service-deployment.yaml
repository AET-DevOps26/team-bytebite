apiVersion: apps/v1
kind: Deployment
metadata:
  name: bytebite-user-service
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.userService.replicaCount }}
  selector:
    matchLabels:
      app: bytebite-user-service-selector
  template:
    metadata:
      labels:
        app: bytebite-user-service-selector
    spec:
      containers:
        - name: user-service
          image: "{{ .Values.userService.image.repository }}:{{ .Values.userService.image.tag }}"
          imagePullPolicy: {{ .Values.userService.image.pullPolicy }}
          resources:
            limits:
              cpu: "500m"
              memory: "512Mi"
            requests:
              cpu: "200m"
              memory: "256Mi"
          ports:
            - containerPort: {{ .Values.userService.service.targetPort }}
          env:
            # The app's dev default port is 8083; override it so it listens on
            # the container/Service port (8080), matching the api-gateway route.
            - name: SERVER_PORT
              value: "{{ .Values.userService.service.targetPort }}"
            {{- if .Values.jwt.secret }}
            # Shared JWT secret (signs tokens). Must match the api-gateway. Only
            # injected when set; otherwise the app's built-in default applies.
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: jwt-secret
                  key: jwt-secret
            {{- end }}
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://user-db:5432/{{ .Values.userDb.name }}"
            - name: SPRING_DATASOURCE_USERNAME
              value: {{ .Values.userDb.user }}
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: user-db-password
