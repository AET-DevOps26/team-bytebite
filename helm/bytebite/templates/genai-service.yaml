apiVersion: v1
kind: Service
metadata:
  name: genai-service
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: bytebite-gen-ai-selector
  ports:
    - port: {{ .Values.genai.service.port }}
      targetPort: {{ .Values.genai.service.targetPort }}
      protocol: TCP
  type: {{ .Values.genai.service.type }}
