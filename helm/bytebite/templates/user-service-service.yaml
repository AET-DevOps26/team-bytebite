apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: bytebite-user-service-selector
  ports:
    - port: {{ .Values.userService.service.port }}
      targetPort: {{ .Values.userService.service.targetPort }}
      protocol: TCP
  type: {{ .Values.userService.service.type }}
