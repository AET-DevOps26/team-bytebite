{{- if .Values.monitoring.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bytebite-prometheus
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.monitoring.prometheus.replicaCount }}
  selector:
    matchLabels:
      app: bytebite-prometheus-selector
  template:
    metadata:
      labels:
        app: bytebite-prometheus-selector
    spec:
      containers:
        - name: prometheus
          image: "{{ .Values.monitoring.prometheus.image.repository }}:{{ .Values.monitoring.prometheus.image.tag }}"
          imagePullPolicy: {{ .Values.monitoring.prometheus.image.pullPolicy }}
          resources:
            {{- toYaml .Values.monitoring.prometheus.resources | nindent 12 }}
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
          ports:
            - containerPort: {{ .Values.monitoring.prometheus.service.targetPort }}
          volumeMounts:
            - name: prometheus-config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
              readOnly: true
            - name: prometheus-data
              mountPath: /prometheus
      volumes:
        - name: prometheus-config
          configMap:
            name: bytebite-prometheus-config
        - name: prometheus-data
          emptyDir: {}
{{- end }}
