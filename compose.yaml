services:
  gen-ai:
    build:
      context: ./gen-ai
    container_name: bytebite-gen-ai
    ports:
      - "8000:8000"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}

  server:
    build:
      context: ./server
    container_name: bytebite-server
    ports:
      - "8080:8080"
    environment:
      GENAI_BASE_URL: http://gen-ai:8000
    depends_on:
      - gen-ai

  client:
    build:
      context: ./client
    container_name: bytebite-client
    ports:
      - "8081:80"
    depends_on:
      - server