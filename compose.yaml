services:
  user-db:
    image: ${REGISTRY:-ghcr.io/aet-devops26/team-bytebite}/user-db:${IMAGE_TAG:-latest}
    build:
      context: ./databases/user-db
    container_name: bytebite-user-db
    environment:
      POSTGRES_DB: ${USER_DB_NAME:-bytebite_user}
      POSTGRES_USER: ${USER_DB_USER:-bytebite_user}
      POSTGRES_PASSWORD: ${USER_DB_PASSWORD:-bytebite_user_password}
    volumes:
      - user-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  grocery-db:
    image: ${REGISTRY:-ghcr.io/aet-devops26/team-bytebite}/grocery-db:${IMAGE_TAG:-latest}
    build:
      context: ./databases/grocery-db
    container_name: bytebite-grocery-db
    environment:
      POSTGRES_DB: ${GROCERY_DB_NAME:-bytebite_grocery}
      POSTGRES_USER: ${GROCERY_DB_USER:-bytebite_grocery}
      POSTGRES_PASSWORD: ${GROCERY_DB_PASSWORD:-bytebite_grocery_password}
    volumes:
      - grocery-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  gen-ai:
    # `up --build` builds this locally; on the VM `pull` fetches it from GHCR.
    image: ${REGISTRY:-ghcr.io/aet-devops26/team-bytebite}/gen-ai:${IMAGE_TAG:-latest}
    build:
      context: ./gen-ai
    container_name: bytebite-gen-ai
    expose:
      - "8000"
    environment:
      LOGOS_KEY: ${LOGOS_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}


  user-service:
    image: ${REGISTRY:-ghcr.io/aet-devops26/team-bytebite}/user-service:${IMAGE_TAG:-latest}
    build:
      context: ./server/user-service
    container_name: bytebite-user-service
    expose:
      - "8080"
    environment:
      SPRING_APPLICATION_NAME: user-service
      # Override the local-dev port (8083) so the container listens on 8080,
      # matching `expose` and the api-gateway's USER_SERVICE_BASE_URL.
      SERVER_PORT: "8080"
      JWT_SECRET: ${JWT_SECRET:-bytebite-local-dev-secret-change-me}
      JWT_EXPIRATION_SECONDS: ${JWT_EXPIRATION_SECONDS:-86400}
      SPRING_DATASOURCE_URL: jdbc:postgresql://user-db:5432/${USER_DB_NAME:-bytebite_user}
      SPRING_DATASOURCE_USERNAME: ${USER_DB_USER:-bytebite_user}
      SPRING_DATASOURCE_PASSWORD: ${USER_DB_PASSWORD:-bytebite_user_password}
    depends_on:
      user-db:
        condition: service_healthy

  grocery-service:
    image: ${REGISTRY:-ghcr.io/aet-devops26/team-bytebite}/grocery-service:${IMAGE_TAG:-latest}
    build:
      context: ./server/grocery-service
    container_name: bytebite-grocery-service
    expose:
      - "8080"
    environment:
      SPRING_APPLICATION_NAME: grocery-service
      # Override the local-dev port (8082) so the container listens on 8080,
      # matching `expose` and the api-gateway's GROCERY_SERVICE_BASE_URL.
      SERVER_PORT: "8080"
      GENAI_BASE_URL: http://gen-ai:8000
      # Shared with user-service so grocery-service can validate the same JWTs.
      JWT_SECRET: ${JWT_SECRET:-bytebite-local-dev-secret-change-me}
      SPRING_DATASOURCE_URL: jdbc:postgresql://grocery-db:5432/${GROCERY_DB_NAME:-bytebite_grocery}
      SPRING_DATASOURCE_USERNAME: ${GROCERY_DB_USER:-bytebite_grocery}
      SPRING_DATASOURCE_PASSWORD: ${GROCERY_DB_PASSWORD:-bytebite_grocery_password}
    depends_on:
      grocery-db:
        condition: service_healthy
      gen-ai:
        condition: service_started

  api-gateway:
    image: ${REGISTRY:-ghcr.io/aet-devops26/team-bytebite}/api-gateway:${IMAGE_TAG:-latest}
    build:
      context: ./server/api-gateway
    container_name: bytebite-api-gateway
    ports:
      - "8080:8080"
    environment:
      SPRING_APPLICATION_NAME: api-gateway
      JWT_SECRET: ${JWT_SECRET:-bytebite-local-dev-secret-change-me}
      USER_SERVICE_BASE_URL: http://user-service:8080
      GROCERY_SERVICE_BASE_URL: http://grocery-service:8080
      GENAI_SERVICE_BASE_URL: http://gen-ai:8000
    depends_on:
      user-service:
        condition: service_started
      grocery-service:
        condition: service_started
      gen-ai:
        condition: service_started

  client:
    image: ${REGISTRY:-ghcr.io/aet-devops26/team-bytebite}/client:${IMAGE_TAG:-latest}
    build:
      context: ./client
    container_name: bytebite-client
    ports:
      - "8081:80"
    depends_on:
      - api-gateway

volumes:
  user-db-data:
  grocery-db-data:
