services:
  server:
    build:
      context: ./server
    container_name: bytebite-server
    ports:
      - "8080:8080"
    environment:
      GENAI_BASE_URL: http://....

  client:
    build:
      context: ./client
    container_name: bytebite-client
    ports:
      - "8081:80"
    depends_on:
      - server