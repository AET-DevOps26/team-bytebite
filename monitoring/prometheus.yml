global:
  scrape_interval: 15s

scrape_configs:
  - job_name: api-gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["api-gateway:8080"]

  - job_name: user-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["user-service:8080"]

  - job_name: grocery-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["grocery-service:8080"]

  - job_name: gen-ai
    metrics_path: /metrics
    static_configs:
      - targets: ["gen-ai:8000"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
