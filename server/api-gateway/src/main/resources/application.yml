server:
  port: 8080

auth:
  jwt:
    secret: ${JWT_SECRET:bytebite-local-dev-secret-change-me}

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: grocery-service
          uri: ${GROCERY_SERVICE_BASE_URL:http://localhost:8082}
          predicates:
            - Path=/api/recipes/**,/api/grocery-list/**
        - id: user-service
          uri: ${USER_SERVICE_BASE_URL:http://localhost:8083}
          predicates:
            - Path=/api/auth/**,/api/users/**
