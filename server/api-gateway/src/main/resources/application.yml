server:
  port: 8080

auth:
  jwt:
    secret: ${JWT_SECRET:bytebite-local-dev-secret-change-me}

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: user-service-openapi
          uri: ${USER_SERVICE_BASE_URL:http://localhost:8083}
          predicates:
            - Path=/v3/api-docs/user-service
          filters:
            - RewritePath=/v3/api-docs/user-service, /v3/api-docs
        - id: grocery-service-openapi
          uri: ${GROCERY_SERVICE_BASE_URL:http://localhost:8082}
          predicates:
            - Path=/v3/api-docs/grocery-service
          filters:
            - RewritePath=/v3/api-docs/grocery-service, /v3/api-docs
        - id: gen-ai-openapi
          uri: ${GENAI_SERVICE_BASE_URL:http://localhost:8000}
          predicates:
            - Path=/v3/api-docs/gen-ai
          filters:
            - RewritePath=/v3/api-docs/gen-ai, /openapi.json
        - id: grocery-service
          uri: ${GROCERY_SERVICE_BASE_URL:http://localhost:8082}
          predicates:
            - Path=/api/recipes/**,/api/grocery-list/**
        - id: user-service
          uri: ${USER_SERVICE_BASE_URL:http://localhost:8083}
          predicates:
            - Path=/api/auth/**,/api/users/**

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  metrics:
    tags:
      application: ${spring.application.name}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: User Service
        url: /v3/api-docs/user-service
      - name: Grocery Service
        url: /v3/api-docs/grocery-service
      - name: Gen AI Service
        url: /v3/api-docs/gen-ai
