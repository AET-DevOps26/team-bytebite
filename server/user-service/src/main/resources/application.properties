spring.application.name=user-service
server.port=8083
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/bytebite_user}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:bytebite_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:bytebite_user_password}
auth.jwt.secret=${JWT_SECRET:bytebite-local-dev-secret-change-me}
auth.jwt.expiration-seconds=${JWT_EXPIRATION_SECONDS:86400}

# Prometheus metrics via Spring Boot Actuator (exposes /actuator/prometheus)
management.endpoints.web.exposure.include=health,prometheus
management.metrics.tags.application=${spring.application.name}
