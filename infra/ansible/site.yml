---
# Configures the bare VM Terraform provisioned and deploys the ByteBite stack.
#   1. docker  — install Docker Engine + Compose plugin
#   2. deploy  — push compose.yaml + .env, log into GHCR, pull images, bring the stack up
#
# Inventory + SSH key are written into this folder by `terraform apply`
# (see infra/terraform/ansible.tf). Run from infra/ansible/:
#   ansible-playbook site.yml -e @deploy-vars.yml
- name: Provision and deploy ByteBite
  hosts: bytebite
  become: true
  # Implicit fact gathering runs before pre_tasks, so disable it and gather
  # explicitly after waiting for SSH — the VM may have just been started from a
  # deallocated state by CI and sshd may not be up yet.
  gather_facts: false
  pre_tasks:
    - name: Wait for SSH to become available
      ansible.builtin.wait_for_connection:
        timeout: 300
      become: false

    - name: Gather facts
      ansible.builtin.setup:
  roles:
    - role: docker
    - role: deploy
