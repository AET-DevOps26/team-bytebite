# Deployment stack for the CURRENT architecture: client -> server -> gen-ai.
# Pull-only (no build: contexts), so it runs on a remote VM straight from GHCR —
# this is what infra/ansible deploys. compose.yaml is the not-yet-built
# microservice split and is NOT deployable yet (its services have no images).
services:
  gen-ai:
    image: ${REGISTRY:-ghcr.io/aet-devops26/team-bytebite}/gen-ai:${IMAGE_TAG:-latest}
    container_name: bytebite-gen-ai
    ports:
      - "8000:8000"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    restart: unless-stopped

  server:
    image: ${REGISTRY:-ghcr.io/aet-devops26/team-bytebite}/server:${IMAGE_TAG:-latest}
    container_name: bytebite-server
    ports:
      - "8080:8080"
    environment:
      # Spring relaxed-binding: maps to the genai.base-url property.
      GENAI_BASE_URL: http://gen-ai:8000
    depends_on:
      - gen-ai
    restart: unless-stopped

  # nginx serves the SPA and proxies /generate -> http://server:8080
  # (so the backend service MUST be named "server").
  client:
    image: ${REGISTRY:-ghcr.io/aet-devops26/team-bytebite}/client:${IMAGE_TAG:-latest}
    container_name: bytebite-client
    ports:
      - "8081:80"
    depends_on:
      - server
    restart: unless-stopped
